<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSAP Progress Bar</title>

  <style>
    .grid-new {
      width: 97%;
      padding-top: 30px;
    }

    /* PROGRESS */

    .progress {
      background: #F4F4F9;
      height: 6px;
      border-radius: 10px;
      position: relative;
      overflow: visible;
    }

    /* BAR */

    .progress__bar {
      width: 0%;
      height: 100%;
      border-top-left-radius: 10px;
      border-bottom-left-radius: 10px;
      border-top-right-radius: 0px;
      border-bottom-right-radius: 0px;
      background-image: linear-gradient(to right, #D2AF38, #D2AF38, #D2AF38);
      position: relative;
    }

    /* PERCENTAGE */

    .progress__percent {
      position: absolute;
      top: -28px;
      right: -10px;
      font-size: 1rem;
      font-weight: 600;
      color: #D2AF38;
    }
  </style>
</head>

<body>

  <div class="">

    <div class="progress">

      <div class="progress__bar">

        <div class="progress__percent">0%</div>

      </div>

    </div>

  </div>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script>

    const progressValue = 5;
    const duration = 2;

    const percent = document.querySelector(".progress__percent");
    const bar = document.querySelector(".progress__bar");

    let radiusTriggered = false;

    /* animate bar */

    gsap.to(bar, {
      width: progressValue + "%",
      duration: duration,
      ease: "power3.out"
    });

    /* animate number */

    gsap.to({ value: 0 }, {
      value: progressValue,
      duration: duration,
      ease: "power3.out",
      onUpdate: function () {

        let current = Math.round(this.targets()[0].value);
        percent.textContent = current + "%";

        /* trigger radius at 97% */

        if (current >= 97 && !radiusTriggered) {

          radiusTriggered = true;

          gsap.to(bar, {
            borderTopRightRadius: 10,
            borderBottomRightRadius: 10,
            duration: 0.4,
            ease: "power2.out"
          });

        }

      }
    });

  </script>

</body>

</html>
