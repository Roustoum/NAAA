    <script>
  class ContactFormAnimation {
    constructor() {
      this.step = 1;
      this.initElements();
      this.initEventListeners();
      this.setInitialState();
    }

    initElements() {
      // Form field elements
      this.formFieldMainWrapper = document.querySelector('.form_field_main-wrapper');
      this.formTitle = document.querySelector('.form_title');
      this.formTitleHeading = document.querySelector('.form_title-heading');
      this.formNumberWrapper = document.querySelector('.form_number-wrapper');
      this.movingNumbers = document.querySelectorAll('.form_number.is-moving');
      this.formTitleText = document.querySelector('.form_title-text');
      
      // Input fields
      this.emailField = document.getElementById('email');
      this.nameField = document.getElementById('name');
      this.messageField = document.getElementById('message');
      
      // Placeholders
      this.emailPlaceholder = document.querySelector('.form_button-placeholder.is-email');
      this.namePlaceholder = document.querySelector('.form_button-placeholder.is-name');
      
      // Checkbox elements
      this.checkboxField = document.querySelector('.form_checkbox-field');
      this.checkboxLabel = document.querySelector('.checkbox-label');
      
      // Submit button elements
      this.submitButtonWrapper = document.querySelector('.form_submit-button-wrapper');
      this.submitText = document.querySelector('.form_submit-text');
      
      // Click areas
      this.clickArea1 = document.querySelector('.form_submit-button-click1');
      this.clickArea2 = document.querySelector('.form_submit-button-click2');
      
      // Submit overlay elements (these don't exist in your HTML, so we'll create them)
      this.createSubmitOverlay();
    }

    createSubmitOverlay() {
      // Create submit overlay elements if they don't exist
      if (!document.querySelector('.contact_submit-wrapper')) {
        const submitOverlay = document.createElement('div');
        submitOverlay.className = 'contact_submit-wrapper';
        submitOverlay.innerHTML = `
          <div class="contact_submit-background"></div>
          <div class="contact_submit-header animate-success">Thank you</div>
        `;
        document.querySelector('.contact_form-block').appendChild(submitOverlay);
      }
      
      this.submitOverlay = document.querySelector('.contact_submit-wrapper');
      this.submitBackground = document.querySelector('.contact_submit-background');
      this.submitHeader = document.querySelector('.contact_submit-header');
    }

    setInitialState() {
      // Initially, only email field is visible
      if (this.nameField) {
        this.nameField.style.display = 'none';
        this.nameField.style.opacity = '0';
        this.nameField.style.height = '0';
      }
      
      if (this.messageField) {
        this.messageField.style.display = 'none';
        this.messageField.style.opacity = '0';
        this.messageField.style.height = '0';
      }
      
      if (this.submitText) {
        this.submitText.style.display = 'none';
        this.submitText.style.opacity = '0';
      }
      
      if (this.checkboxField) {
        this.checkboxField.style.width = '0';
        this.checkboxField.style.opacity = '0';
      }
      
      if (this.checkboxLabel) {
        this.checkboxLabel.style.transform = 'translateY(2rem)';
        this.checkboxLabel.style.opacity = '0';
      }
    }

    initEventListeners() {
      // Use the existing click areas from your HTML
      if (this.clickArea1) {
        this.clickArea1.addEventListener('click', () => {
          if (this.step === 1) {
            this.nextStep();
          }
        });
      }
      
      if (this.clickArea2) {
        this.clickArea2.addEventListener('click', () => {
          if (this.step === 2) {
            this.nextStep();
          }
        });
      }

      // Form submit
      const form = document.getElementById('contact');
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          this.handleSubmit();
        });
      }
      
      // Monitor email input to enable click area 1
      if (this.emailField) {
        this.emailField.addEventListener('input', () => {
          if (this.emailField.value.trim() !== '') {
            this.clickArea1?.classList.remove('pointer-events-off');
          } else {
            this.clickArea1?.classList.add('pointer-events-off');
          }
        });
      }
      
      // Monitor name input to enable click area 2
      if (this.nameField) {
        this.nameField.addEventListener('input', () => {
          if (this.nameField.value.trim() !== '') {
            this.clickArea2?.classList.remove('pointer-events-off');
          } else {
            this.clickArea2?.classList.add('pointer-events-off');
          }
        });
      }
      
      // Monitor checkbox
      const checkbox = document.getElementById('checkbox');
      if (checkbox) {
        checkbox.addEventListener('change', () => {
          this.updateSubmitButtonState();
        });
      }
      
      // Monitor message field
      if (this.messageField) {
        this.messageField.addEventListener('input', () => {
          this.updateSubmitButtonState();
        });
      }
    }
    
    updateSubmitButtonState() {
      const messageValue = this.messageField?.value.trim() || '';
      const isChecked = document.getElementById('checkbox')?.checked || false;
      
      if (messageValue !== '' && isChecked) {
        this.submitButtonWrapper?.classList.add('is-active');
      } else {
        this.submitButtonWrapper?.classList.remove('is-active');
      }
    }

    nextStep() {
      if (this.step === 1) {
        this.step1Animation();
        this.step = 2;
      } else if (this.step === 2) {
        this.step2Animation();
        this.step = 3;
      }
    }

    step1Animation() {
      console.log('Step 1 animation');
      
      // First group: hide elements
      if (this.nameField) {
        this.nameField.style.transition = 'height 0.5s ease, opacity 0.5s ease';
        this.nameField.style.height = '0';
        this.nameField.style.opacity = '0';
      }
      
      if (this.messageField) {
        this.messageField.style.transition = 'opacity 0.5s ease';
        this.messageField.style.opacity = '0';
      }
      
      if (this.submitText) {
        this.submitText.style.transition = 'opacity 0.5s ease';
        this.submitText.style.opacity = '0';
        setTimeout(() => {
          this.submitText.style.display = 'none';
        }, 500);
      }
      
      if (this.checkboxField) {
        this.checkboxField.style.transition = 'width 0.5s ease, opacity 0.5s ease';
        this.checkboxField.style.width = '0';
        this.checkboxField.style.opacity = '0';
      }
      
      if (this.formFieldMainWrapper) {
        this.formFieldMainWrapper.style.transition = 'transform 0.5s ease';
        this.formFieldMainWrapper.style.transform = 'translateY(9.3rem)';
      }
      
      if (this.formTitle) {
        this.formTitle.style.transition = 'height 0.5s ease';
        this.formTitle.style.height = '13rem';
      }
      
      if (this.formTitleText) {
        this.formTitleText.style.transition = 'opacity 0.5s ease';
        this.formTitleText.style.opacity = '1';
      }
      
      if (this.formTitleHeading) {
        this.formTitleHeading.style.transition = 'transform 0.5s ease';
        this.formTitleHeading.style.transform = 'scale(1)';
      }
      
      // Second group (after 500ms)
      setTimeout(() => {
        if (this.formTitle) {
          this.formTitle.style.transition = 'height 1.2s cubic-bezier(0.165, 0.84, 0.44, 1)';
          this.formTitle.style.height = '3rem';
        }
        
        if (this.formTitleText) {
          this.formTitleText.style.transition = 'opacity 1.2s cubic-bezier(0.19, 1, 0.22, 1)';
          this.formTitleText.style.opacity = '0';
        }
        
        if (this.formTitleHeading) {
          this.formTitleHeading.style.transition = 'transform 1.2s cubic-bezier(0.165, 0.84, 0.44, 1)';
          this.formTitleHeading.style.transform = 'translate(-0.8rem, -0.25rem) scale(0.75)';
        }
        
        if (this.formNumberWrapper) {
          this.formNumberWrapper.style.transition = 'transform 1.2s cubic-bezier(0.165, 0.84, 0.44, 1)';
          this.formNumberWrapper.style.transform = 'translateY(-0.25rem)';
        }
      }, 500);
      
      // Third group (after 1800ms)
      setTimeout(() => {
        if (this.formFieldMainWrapper) {
          this.formFieldMainWrapper.style.transition = 'transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1)';
          this.formFieldMainWrapper.style.transform = 'translateY(5rem)';
        }
        
        if (this.nameField) {
          this.nameField.style.display = 'block';
          this.nameField.style.transition = 'height 1.2s cubic-bezier(0.165, 0.84, 0.44, 1), opacity 0.8s cubic-bezier(0.165, 0.84, 0.44, 1)';
          this.nameField.style.height = '3.5rem';
          this.nameField.style.opacity = '1';
        }
        
        this.movingNumbers.forEach(num => {
          num.style.transition = 'transform 1.8s cubic-bezier(0.165, 0.84, 0.44, 1)';
          num.style.transform = 'translateY(-1.53rem)';
        });
        
        if (this.emailPlaceholder) {
          setTimeout(() => {
            this.emailPlaceholder.style.transition = 'width 1.8s cubic-bezier(0.165, 0.84, 0.44, 1)';
            this.emailPlaceholder.style.width = '0';
          }, 100);
        }
      }, 1800);
    }
step2Animation() {
  console.log('Step 2 animation - textarea appears exactly like name field');
  
  // a-67-n-4: Set submit button wrapper width to 3.5rem (duration 1800ms)
  if (this.submitButtonWrapper) {
    this.submitButtonWrapper.style.transition = 'width 1800ms cubic-bezier(0.165, 0.84, 0.44, 1)';
    this.submitButtonWrapper.style.width = '3.5rem';
  }
  
  // a-67-n-9: Move numbers to -3rem (duration 1800ms)
  this.movingNumbers.forEach(num => {
    num.style.transition = 'transform 1800ms cubic-bezier(0.165, 0.84, 0.44, 1)';
    num.style.transform = 'translateY(-3rem)';
  });
  
  // a-67-n-10: Set submit text display to block
  if (this.submitText) {
    this.submitText.style.display = 'block';
  }
  
  // a-67-n-12: Set submit text opacity to 1 (duration 1600ms)
  if (this.submitText) {
    this.submitText.style.transition = 'opacity 1600ms cubic-bezier(0.165, 0.84, 0.44, 1)';
    this.submitText.style.opacity = '1';
  }
  
  // a-67-n-17: Reset main wrapper transform to 0 (duration 1400ms)
  if (this.formFieldMainWrapper) {
    this.formFieldMainWrapper.style.transition = 'transform 1400ms cubic-bezier(0.165, 0.84, 0.44, 1)';
    this.formFieldMainWrapper.style.transform = 'translateY(0)';
  }
  
  // a-67-n-18: Set name placeholder width to 0 (delay 100ms, duration 1800ms)
  setTimeout(() => {
    if (this.namePlaceholder) {
      this.namePlaceholder.style.transition = 'width 1800ms cubic-bezier(0.165, 0.84, 0.44, 1)';
      this.namePlaceholder.style.width = '0';
    }
  }, 100);
  
  // a-67-n-19: Set submit button wrapper width to 11rem (delay 200ms, duration 1400ms)
  setTimeout(() => {
    if (this.submitButtonWrapper) {
      this.submitButtonWrapper.style.transition = 'width 1400ms cubic-bezier(0.165, 0.84, 0.44, 1)';
      this.submitButtonWrapper.style.width = '11rem';
    }
  }, 200);
  
  // Make textarea appear exactly like the name field appeared in step1Animation
  // In step1Animation, the name field appears after 1800ms with:
  // - display: block
  // - transition: height 1.2s cubic-bezier(...), opacity 0.8s cubic-bezier(...)
  // - height: 3.5rem
  // - opacity: 1
  
  setTimeout(() => {
    if (this.messageField) {
      // First make it visible but with no height/opacity
      this.messageField.style.display = 'block';
      this.messageField.style.height = '0';
      this.messageField.style.opacity = '0';
      
      // Force a reflow
      this.messageField.offsetHeight;
      
      // Then apply transitions and animate to full height
      this.messageField.style.transition = 'height 1200ms cubic-bezier(0.165, 0.84, 0.44, 1), opacity 800ms cubic-bezier(0.165, 0.84, 0.44, 1)';
      this.messageField.style.height = '12rem'; // Textarea height
      this.messageField.style.opacity = '1';
      
      // Add padding after opacity animation completes
      setTimeout(() => {
        this.messageField.style.padding = '1rem 2rem 1rem 1.5rem';
      }, 800);
    }
  }, 1800); // Same 1800ms delay as the name field in step1Animation
}

    <script>
      // On click of '.form_submit-button-click1
      $(".form_submit-button-click1").on("click", function () {
        $(".contact_click-1").click();
        $(".form_submit-button-wrapper").removeClass("is-active");
        $(".form_submit-button-click1").css("display", "none");
        $(".form_submit-button-click2").css("display", "block");
      });

      // On click of '.form_submit-button-click2
      $(".form_submit-button-click2").on("click", function () {
        $(".contact_click-2").click();
        $(".form_submit-button-wrapper").removeClass("is-active");
        $(".form_submit-button-click2").css("display", "none");
        $(".form_submit-button").css("pointer-events", "auto");
        $(".form_checkbox-field").css("pointer-events", "auto");
        $(".form_field.is-input").css("padding-top", "1rem");
      });

      function updateUIBasedOnInput() {
        var emailValue = $("#email").val().trim();
        var nameValue = $("#name").val().trim();
        var messageValue = $("#message").val().trim();

        if (emailValue !== "") {
          $(".form_submit-button-wrapper").addClass("is-active");
          $(".form_submit-button-click1").removeClass("pointer-events-off");
        } else {
          $(".form_submit-button-wrapper").removeClass("is-active");
          $(".form_submit-button-click1").addClass("pointer-events-off");
        }

        if (nameValue !== "") {
          $(".form_submit-button-click2").removeClass("pointer-events-off");
        } else {
          $(".form_submit-button-click2").addClass("pointer-events-off");
        }

        var isChecked = $("#checkbox").is(":checked"); // Initial state of the checkbox

        $("#checkbox").change(function () {
          isChecked = $(this).is(":checked"); // Update the boolean variable based on the checkbox state
        });

        if ($(".form_submit-button").css("pointer-events") === "auto") {
          if (messageValue !== "" && isChecked) {
            $(".form_submit-button-wrapper").addClass("is-active");
          } else {
            $(".form_submit-button-wrapper").removeClass("is-active");
          }
        }
      }

      updateUIBasedOnInput();
      $("#email, #name, #message, #checkbox").on("input", updateUIBasedOnInput);

      $(document).ready(function () {
        // Listen for the submit event on the form with the id 'contact'
        $("#contact").on("submit", function (e) {
          // Prevent the default form submission behavior
          e.preventDefault();

          // Trigger a click on the element with the class 'contact_submit'
          $(".contact_submit").click();
          triggerSuccessAnimation();
        });
      });
    </script>
