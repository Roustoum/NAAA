    <script>
      // =============================================================
      // Custom page transition
      // =============================================================

      document.addEventListener("DOMContentLoaded", function () {

        // Function to handle the link click
        function handleLinkClick(event) {
          var link = event.currentTarget;
          var href = link.getAttribute("href");
          var currentBaseURL = window.location.href.split('#')[0];
          var targetBaseURL = new URL(href, window.location.href).href.split('#')[0];

          // Check if the link is an anchor link (internal link on the same page)
          var isAnchorLink = href.startsWith('#') || currentBaseURL === targetBaseURL;

          // Log to the console and apply a delay if an anchor link on the same page is clicked
          if (isAnchorLink && href.includes('#')) {
            console.log("Anchor link clicked:", href);
          }


          if (!isAnchorLink) {


            // For non-anchor links, prevent the default action
            event.preventDefault();

            // Trigger the click on the .page-loader_out-trigger element for non-anchor links
            var pageLoaderOutTrigger = document.querySelector('.page-loader_out-trigger');
            if (pageLoaderOutTrigger) {
              pageLoaderOutTrigger.click();
            }

            // Delay the navigation to the new page for non-anchor links
            setTimeout(function () {
              window.location.href = href;
            }, 1200); // Delay set to 1200 ms for non-anchor links
          }
        }

        // Attach the event listener to all links
        var links = document.querySelectorAll('a');
        links.forEach(function (link) {
          link.addEventListener('click', handleLinkClick);
        });

      });


    </script>

    <script>
      // ==============================================================
      // Button – Open in new tab attribute
      // ==============================================================

      $('[newwindow="true"]').click(function (event) {
        event.preventDefault();
        var url = $(this).attr('href');
        window.open(url, '_blank');
      });



      // =============================================================
      // GSAP – Stagger Fade
      // =============================================================


      function animateStaggerElements(containerSelector, targetSelector, animationProps) {
        $(containerSelector).each(function () {
          gsap.fromTo($(this).find(targetSelector),
            animationProps.from,
            {
              ...animationProps.to,
              scrollTrigger: {
                trigger: this,
                ...animationProps.to.scrollTrigger,
                toggleActions: 'play reset play reset'
              }
            }
          );
        });
      }


      // Animate .stagger-expand elements
      animateStaggerElements('.stagger-wrapper', '.stagger-expand', {
        from: { width: '0%' },
        to: {
          duration: 0.8,
          width: '100%',
          stagger: 0.2,
          ease: 'power2.out',
          scrollTrigger: {
            start: 'top 90%',
            end: 'bottom top',
            toggleActions: 'play none none none'
          }
        }
      });

      // Animate .stagger-fade elements
      animateStaggerElements('.stagger-wrapper', '.stagger-fade', {
        from: { opacity: 0, y: 20 },
        to: {
          duration: 0.8,
          opacity: 1,
          y: 0,
          stagger: 0.2,
          ease: 'power2.out',
          scrollTrigger: {
            start: 'top bottom',
            end: 'bottom top',
            toggleActions: 'play none none none'
          }
        }
      });


      // =============================================================
      // GSAP – Animate Hero
      // =============================================================

      gsap.registerPlugin(ScrollTrigger, SplitText);

      document.querySelectorAll('.animate-hero').forEach(element => {
        let split = new SplitText(element, { type: 'chars' });

        let tl = gsap.timeline({
          paused: true, // Pause the timeline initially
          scrollTrigger: {
            trigger: element,
            start: 'top bottom',
            end: 'bottom top',
            onEnter: () => tl.play(), // Play the timeline when entering
            onLeave: () => tl.restart().pause(), // Reset and pause the timeline when leaving
            onEnterBack: () => tl.play(), // Play the timeline when entering from back
            onLeaveBack: () => tl.restart().pause(), // Reset and pause the timeline when leaving back
          }
        });

        tl.from(split.chars, {
          duration: 0.6,
          opacity: 0,
          y: 50,
          stagger: 0.05,
          ease: "power3.inOut",
        }).pause(); // Pause the timeline after setup
      });


    </script>

    <script>
      // Initialisation
      gsap.registerPlugin(SplitText, ScrollTrigger);

      // Sélectionner tous les éléments avec la classe naaa-char
      document.querySelectorAll('.naaa-char').forEach(element => {
        // Split le texte en caractères
        const splittedTitle = new SplitText(element, {
          type: "words,chars",
          noBalance: true
        });

        // Direction par défaut (1 = droite, -1 = gauche)
        const direction = 1;

        // Set initial state
        gsap.set(splittedTitle.chars, {
          opacity: 0,
          rotateY: 70 * direction,
          x: (8 * direction) + "rem"
        });

        // Create timeline
        const tl = gsap.timeline({
          paused: true
        });

        // Add animations
        tl.fromTo(splittedTitle.chars,
          { opacity: 0 },
          {
            opacity: 1,
            ease: "power2.out",
            duration: 0.4,
            stagger: 0.03 * direction
          }, 0
        ).fromTo(splittedTitle.chars,
          {
            x: (8 * direction) + "rem",
            rotateY: 70 * direction
          },
          {
            x: 0,
            rotateY: 0,
            ease: "expo.out",
            duration: 1.25,
            stagger: 0.03 * direction
          }, "<"
        );

        // Create ScrollTrigger
        ScrollTrigger.create({
          trigger: element,
          start: "top 75%",
          toggleActions: 'play reverse play reverse',
          animation: tl
        });
      });
    </script>
